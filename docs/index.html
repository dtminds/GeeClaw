<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeeClaw - OpenClaw 一键安装 | AI 助手下载</title>
  <meta name="description" content="GeeClaw 是面向 OpenClaw 的桌面 AI 助手入口，支持一键安装、模型热插拔、技能扩展与浏览器自动化能力，让复杂任务在一个对话入口内完成。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />

<body>
  <div class="page-shell" id="page-top">
    <div class="hero-glow" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" data-brand="geeclaw" href="#page-top" aria-label="GeeClaw 首页">
        <span class="brand-mark" aria-hidden="true">G</span>
        <span class="brand-copy">
          <strong>GeeClaw</strong>
          <span class="brand-divider" aria-hidden="true"></span>
          <small>By OpenClaw</small>
        </span>
      </a>

      <nav class="topbar-actions" aria-label="页面导航">
        <a class="topbar-link" href="#downloads">下载体验</a>
      </nav>
    </header>

    <main class="hero">
      <section class="hero-copy">
        <h1 data-copy="hero-title">你的私人智能助理</h1>
        <p class="hero-desc" data-copy="hero-description">
          不在云端，更胜云端
        </p>

        <div class="hero-buttons" id="downloads">
          <a class="button button-dark hero-cta" data-download-target="mac-apple-silicon" href="#">
            下载体验 for Mac（Apple Silicon）
          </a>
          <a class="button button-dark hero-cta" data-download-target="mac-intel" href="#">
            下载体验 for Mac（Intel）
          </a>
          <a class="button button-dark hero-cta" data-download-target="windows" href="#">
            下载体验 for Windows
          </a>
        </div>
      </section>

      <section class="workspace-shot" aria-label="GeeClaw 工作台界面">
        <img data-hero-image src="" alt="GeeClaw 工作台界面" />
      </section>
    </main>

    <section class="flow-section" aria-label="GeeClaw 产品流程">
      <h2 data-copy="flow-title">它不是一个全能Agent</h2>
      <p class="flow-intro" data-copy="flow-intro">
        很多人告诉你可以用它干任何事情，但它更适合用来拓展你的记忆和执行力
      </p>

      <div class="flow-grid">
        <article class="flow-card">
          <div class="flow-preview">
            <img class="flow-preview-image" data-flow-image="task" src="" alt="发起任务预览" />
          </div>
          <h3 data-copy="flow-card-1-title">发起任务</h3>
          <p data-copy="flow-card-1-description">
            任务入口就是一条对话，不是配置页，也不是另一套任务系统。
          </p>
        </article>

        <article class="flow-card">
          <div class="flow-preview">
            <img class="flow-preview-image" data-flow-image="execution" src="" alt="分身执行预览" />
          </div>
          <h3 data-copy="flow-card-2-title">分身执行</h3>
          <p data-copy="flow-card-2-description">
            智能体继续推进，本地工具真实执行，步骤和状态都在同一条轨道里展开。
          </p>
        </article>

        <article class="flow-card">
          <div class="flow-preview">
            <img class="flow-preview-image" data-flow-image="return" src="" alt="结果回流预览" />
          </div>
          <h3 data-copy="flow-card-3-title">结果回流</h3>
          <p data-copy="flow-card-3-description">
            接住的不只是结论，还有上下文、进展和下一步接力点。
          </p>
        </article>
      </div>
    </section>

    <footer class="footer">
      <a data-legal-link="privacy" href="#">隐私政策</a>
      <a data-legal-link="terms" href="#">服务条款</a>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>

</html>
