name: Bug report
description: Report a reproducible problem in GeeClaw
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

        Please use this template for reproducible product or developer workflow bugs.
        For security issues, follow `SECURITY.md` and do not open a public issue first.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A concise description of the problem.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which build type are you using?
      options:
        - Packaged app
        - Development build (`pnpm dev`)
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, release tag, or commit SHA
      placeholder: 0.9.2 / v0.9.2 / fe5cec9
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please list exact steps so we can reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or add screenshots. Please redact secrets and personal data.
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that may help with triage?
