# GeeClaw Release Workflow
# Builds and publishes releases for macOS, Windows, and Linux

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.job_name }}
    strategy:
      matrix:
        include:
          - os: macos-15
            platform: mac
            arch: arm64
            build_script: package:mac:arm64
            artifact_name: release-mac-arm64
            job_name: release-mac-arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
            build_script: package:mac:x64
            artifact_name: release-mac-x64
            job_name: release-mac-x64
          - os: windows-latest
            platform: win
            arch: multi
            build_script: package:win
            artifact_name: release-win
            job_name: release-win
          # Temporarily disable Linux release builds.
          # Restore by uncommenting the entry below.
          # - os: ubuntu-latest
          #   platform: linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate package version matches tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Tag version v${TAG_VERSION} does not match package.json version ${VERSION}."
              exit 1
            fi
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-

      - name: Restore npm cache for openclaw-runtime installs
        uses: actions/cache@v4
        with:
          path: openclaw-runtime/.npm-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-openclaw-runtime-npm-cache-${{ hashFiles('openclaw-runtime/package-lock.json', 'openclaw-runtime/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-openclaw-runtime-npm-cache-

      - name: Restore Electron build caches
        if: matrix.platform == 'mac'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-builder-cache-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'electron-builder.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-builder-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binaries for macOS
        if: matrix.platform == 'mac'
        run: pnpm run uv:download:mac

      - name: Download uv binaries for Windows
        if: matrix.platform == 'win'
        run: pnpm run uv:download:win

      # Temporarily disable Linux release builds.
      # Restore by uncommenting the step below.
      # - name: Download uv binaries for Linux
      #   if: matrix.platform == 'linux'
      #   run: pnpm run uv:download:linux

      # macOS specific steps
      - name: Free disk space (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          # Remove large pre-installed toolchains not needed for Electron builds
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/node_modules || true
          rm -rf ~/Library/Caches/electron-builder/dmg-builder* || true
          # Homebrew cleanup
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /
      # --publish never: prevent electron-builder from auto-publishing to GitHub.
      # All artifacts are collected and published atomically in the publish job.
      - name: Build macOS
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ulimit -n 65536
          echo "File descriptor limit: $(ulimit -n)"
          pnpm run ${{ matrix.build_script }}

      # Windows specific steps
      - name: Build Windows
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run ${{ matrix.build_script }}

      # Temporarily disable Linux release builds.
      # Restore by uncommenting the step below.
      # - name: Build Linux
      #   if: matrix.platform == 'linux'
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: pnpm run package:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            !release/builder-debug.yml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job: Publish to GitHub Releases
  # ──────────────────────────────────────────────────────────────
  publish:
    needs: release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check whether GitHub release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all downloaded artifacts
        run: |
          echo "=== All artifacts downloaded ==="
          find release-artifacts/ -type f -exec ls -lh {} \;
          echo ""
          echo "=== File tree ==="
          tree release-artifacts/ || find release-artifacts/ -print

      - name: Remove duplicate builder-debug files
        run: |
          echo "Removing builder-debug.yml files to avoid duplicate asset upload conflicts..."
          find release-artifacts/ -name "builder-debug.yml" -delete -print || true

      - name: Create GitHub Release (as pre-release)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && steps.release_check.outputs.exists != 'true'
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.yml
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          overwrite_files: true
          body: |
            ## 🚀 GeeClaw ${{ github.ref_name }}
            
            GeeClaw - Graphical AI Assistant based on OpenClaw
            
            ### 📦 Downloads
            
            Please select the appropriate installer for your operating system and architecture:
            
            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `GeeClaw-*-mac-arm64.dmg`
            - **Intel (x64)**: `GeeClaw-*-mac-x64.dmg`
            
            #### Windows
            - **Installer (x64)**: `GeeClaw-*-win-x64.exe`
            - **Installer (ARM64)**: `GeeClaw-*-win-arm64.exe`
            
            ### 📝 Release Notes
            
            See the auto-generated release notes below for detailed changes.
            
            ### ⚠️ Installation Notes
            
            - **macOS**: On first launch, you may see "cannot verify developer". Go to System Preferences → Security & Privacy to allow the app to run
            - **Windows**: SmartScreen may block the app. Click "More info" → "Run anyway" to proceed
            ---
            
            💬 Found an issue? Please submit an [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to existing GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.release_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          TAG="${GITHUB_REF#refs/tags/}"
          files=(
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.yml
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to upload." >&2
            exit 1
          fi

          gh release upload "$TAG" "${files[@]}" \
            --clobber \
            --repo "${{ github.repository }}"

  # ──────────────────────────────────────────────────────────────
  # Job: Upload to Alibaba Cloud OSS
  # Uploads all release artifacts to OSS for:
  #   - Official website downloads (via release-info.json)
  #   - electron-updater auto-update (via {channel}-*.yml)
  #
  # Directory structure on OSS (channel-separated):
  #   latest/          → stable releases (latest.yml, latest-mac.yml, …)
  #   alpha/           → alpha  releases (alpha.yml,  alpha-mac.yml, …)
  #   beta/            → beta   releases (beta.yml,   beta-mac.yml,  …)
  #   releases/vX.Y.Z/ → permanent archive, never deleted
  # ──────────────────────────────────────────────────────────────
  upload-oss:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Extract version and channel
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="v${VERSION}"

          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Tag ${TAG} does not match package.json version ${VERSION}."
            exit 1
          fi

          # Detect channel from semver prerelease tag
          # e.g. 0.1.8-alpha.0 → alpha, 1.0.0-beta.1 → beta, 1.0.0 → latest
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
          else
            CHANNEL="latest"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}, channel: ${CHANNEL}"

      - name: Prepare upload directories
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          mkdir -p staging/${CHANNEL}
          mkdir -p staging/releases/${TAG}

          # Flatten all platform artifacts into staging directories
          find release-artifacts/ -type f | while read file; do
            filename=$(basename "$file")
            cp "$file" "staging/${CHANNEL}/${filename}"
            cp "$file" "staging/releases/${TAG}/${filename}"
          done

          echo "=== staging/${CHANNEL}/ ==="
          ls -lh staging/${CHANNEL}/
          echo ""
          echo "=== staging/releases/${TAG}/ ==="
          ls -lh staging/releases/${TAG}/

      # Note: Do NOT rename yml files. electron-updater (generic provider) always
      # requests "latest-mac.yml", "latest.yml", etc. regardless of feed URL.
      # Channel separation is achieved by directory: /alpha/, /beta/, /latest/.
      - name: Verify yml files present
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          echo "=== staging/${CHANNEL}/ (update metadata) ==="
          ls -la staging/${CHANNEL}/*.yml 2>/dev/null || echo "No yml files found (check electron-builder outputs)"

      - name: Generate release-info.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          BASE_URL="https://geeclaw.dtminds.com/${CHANNEL}"

          # Temporarily disable Linux release metadata.
          # Restore the Linux download entries in the jq payload below when Linux releases resume.

          jq -n \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base "$BASE_URL" \
            --arg changelog "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" \
            '{
              version: $version,
              channel: $channel,
              releaseDate: $date,
              downloads: {
                mac: {
                  x64: ($base + "/GeeClaw-" + $version + "-mac-x64.dmg"),
                  arm64: ($base + "/GeeClaw-" + $version + "-mac-arm64.dmg")
                },
                win: {
                  x64: ($base + "/GeeClaw-" + $version + "-win-x64.exe"),
                  arm64: ($base + "/GeeClaw-" + $version + "-win-arm64.exe")
                }
              },
              changelog: $changelog
            }' > staging/${CHANNEL}/release-info.json

          echo "=== release-info.json ==="
          cat staging/${CHANNEL}/release-info.json

      - name: Install and configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          curl -sL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

          # Write config file for non-interactive use
          cat > $HOME/.ossutilconfig << EOF
          [Credentials]
          language=EN
          endpoint=oss-cn-shanghai.aliyuncs.com
          accessKeyID=${OSS_ACCESS_KEY_ID}
          accessKeySecret=${OSS_ACCESS_KEY_SECRET}
          EOF

          ossutil --version

      - name: "Upload to OSS: {channel}/ artifacts"
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          find "staging/${CHANNEL}" -maxdepth 1 -type f \
            ! -name "*.yml" \
            ! -name "release-info.json" | while read -r file; do
              filename="$(basename "${file}")"
              ossutil cp -f \
                --meta="Cache-Control:public,max-age=31536000,immutable" \
                "${file}" \
                "oss://xingyun-ai/${CHANNEL}/${filename}"
            done

          echo "Uploaded to ${CHANNEL}/"

      - name: "Upload to OSS: {channel}/ metadata"
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"
          find "staging/${CHANNEL}" -maxdepth 1 -type f \
            \( -name "*.yml" -o -name "release-info.json" \) | while read -r file; do
              filename="$(basename "${file}")"
              ossutil cp -f \
                --meta="Cache-Control:no-cache,no-store,must-revalidate" \
                "${file}" \
                "oss://xingyun-ai/${CHANNEL}/${filename}"
            done

          echo "Uploaded channel metadata to ${CHANNEL}/"

      - name: "Upload to OSS: releases/vX.Y.Z/ (archive)"
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Upload to permanent archive (long cache, immutable)
          ossutil cp -r \
            staging/releases/${TAG}/ \
            oss://xingyun-ai/releases/${TAG}/ \
            --meta "Cache-Control:public,max-age=31536000,immutable"

          echo "Uploaded to releases/${TAG}/"

      - name: Verify OSS upload
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          echo "=== ${CHANNEL}/ ==="
          ossutil ls oss://xingyun-ai/${CHANNEL}/ --short

          echo ""
          echo "=== releases/${TAG}/ ==="
          ossutil ls oss://xingyun-ai/releases/${TAG}/ --short

          echo ""
          echo "=== Verify release-info.json ==="
          ossutil cp oss://xingyun-ai/${CHANNEL}/release-info.json /tmp/release-info.json -f
          jq . /tmp/release-info.json

          echo ""
          echo "=== Verify update yml ==="
          if [ "${CHANNEL}" = "latest" ]; then
            YML_PREFIX="latest"
          else
            YML_PREFIX="${CHANNEL}"
          fi
          echo "electron-updater expects ${YML_PREFIX}-mac.yml, ${YML_PREFIX}.yml, etc. in ${CHANNEL}/:"
          ossutil ls oss://xingyun-ai/${CHANNEL}/ --short | grep "${YML_PREFIX}.*\\.yml" || echo "(none found)"
          
          echo ""
          echo "All files uploaded and verified successfully!"

  # ──────────────────────────────────────────────────────────────
  # Job: Finalize Release
  # Promotes the GitHub Release from pre-release to latest AFTER
  # both GitHub Release assets and OSS uploads are fully complete.
  # This ensures /releases/latest API never returns an incomplete
  # release — the website and electron-updater only see it when
  # all platform artifacts are ready.
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: [publish, upload-oss]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Promote release from pre-release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IS_PRERELEASE_CHANNEL=false

          if [[ "${VERSION}" == *-* ]]; then
            IS_PRERELEASE_CHANNEL=true
          fi

          if [ "$IS_PRERELEASE_CHANNEL" = "true" ]; then
            echo "Tag $TAG is a prerelease — keeping as pre-release."
          else
            echo "Promoting $TAG from pre-release to latest release..."
            gh release edit "$TAG" \
              --prerelease=false \
              --latest \
              --repo "${{ github.repository }}"
            echo "Release $TAG is now the latest release."
          fi
