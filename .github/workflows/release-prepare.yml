name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type or exact version (patch / minor / major / x.y.z / x.y.z-beta.N)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Compute next version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          app_version=$(node - <<'EOF'
          const fs = require("node:fs");
          const path = "package.json";
          const input = process.env.INPUT_VERSION;
          const source = fs.readFileSync(path, "utf8");
          const pkg = JSON.parse(source);

          const bump = (version, release) => {
            const match = version.match(/^(\d+)\.(\d+)\.(\d+)(-.+)?$/);
            if (!match) {
              throw new Error(`Unsupported current version: ${version}`);
            }

            const [, majorRaw, minorRaw, patchRaw] = match;
            let major = Number(majorRaw);
            let minor = Number(minorRaw);
            let patch = Number(patchRaw);

            if (release === "major") {
              major += 1;
              minor = 0;
              patch = 0;
              return `${major}.${minor}.${patch}`;
            }

            if (release === "minor") {
              minor += 1;
              patch = 0;
              return `${major}.${minor}.${patch}`;
            }

            if (release === "patch") {
              patch += 1;
              return `${major}.${minor}.${patch}`;
            }

            return release;
          };

          const nextVersion = ["major", "minor", "patch"].includes(input)
            ? bump(pkg.version, input)
            : input;

          const updated = source.replace(
            /"version":\s*"[^"]+"/,
            `"version": "${nextVersion}"`,
          );

          if (updated === source) {
            throw new Error("Failed to update package.json version field");
          }

          fs.writeFileSync(path, updated);
          process.stdout.write(nextVersion);
          EOF
          )

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$app_version" >> "$GITHUB_OUTPUT"
          echo "branch_name=release/v$app_version" >> "$GITHUB_OUTPUT"

      - name: Commit release branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin "${{ steps.version.outputs.branch_name }}" >/dev/null 2>&1; then
            echo "Branch ${{ steps.version.outputs.branch_name }} already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git switch -c "${{ steps.version.outputs.branch_name }}"
          git add package.json

          if git diff --cached --quiet; then
            echo "No version change detected" >&2
            exit 1
          fi

          git commit -m "chore: prepare ${{ steps.version.outputs.tag_name }}"
          git push --set-upstream origin "${{ steps.version.outputs.branch_name }}"

      - name: Create release PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          body_path="$RUNNER_TEMP/release-pr.md"
          cat > "$body_path" <<'EOF'
          ## Summary
          - bump `package.json` to `${{ steps.version.outputs.app_version }}`
          - prepare the release branch for tag `${{ steps.version.outputs.tag_name }}`

          Merge this PR, then push the tag or dispatch the release workflow for `${{ steps.version.outputs.tag_name }}`.
          EOF

          existing_pr=$(gh pr list \
            --head "${{ steps.version.outputs.branch_name }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for ${{ steps.version.outputs.branch_name }}"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch_name }}" \
            --title "chore: prepare ${{ steps.version.outputs.tag_name }}" \
            --body-file "$body_path"
